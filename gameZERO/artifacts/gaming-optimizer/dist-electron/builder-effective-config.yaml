directories:
  output: dist-electron
  buildResources: build
appId: com.gab1-05.gamezero
productName: gameZERO
executableName: gameZERO
copyright: Copyright © 2025 gab1-05
files:
  - filter:
      - dist-web/**/*
      - electron/main.bundle.cjs
      - electron/preload.cjs
      - build/**/*
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  icon: build/icon.ico
win:
  target:
    - target: zip
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  icon: public/favicon.svg
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
portable:
  artifactName: ${productName}-${version}-portable.${ext}
asarUnpack:
  - '**/node_modules/systeminformation/**/*'
  - '**/*.node'
electronVersion: 43.0.0
